<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Análise EDI - Moderno</title>

    <!-- Dummy favicon to prevent 404 -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (Dev/CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#6366F1',
                        success: '#10B981',
                        error: '#EF4444',
                        surface: '#FFFFFF',
                        background: '#F3F4F6',
                        'card-hover': '#F9FAFB',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.04)',
                        'float': '0 12px 30px -4px rgba(0, 0, 0, 0.08), 0 8px 16px -4px rgba(0, 0, 0, 0.03)',
                        'glow-success': '0 0 24px rgba(16, 185, 129, 0.25)',
                        'glow-error': '0 0 24px rgba(239, 68, 68, 0.25)',
                        'glow-blue': '0 0 24px rgba(59, 130, 246, 0.25)'
                    },
                    borderRadius: {
                        'xl': '1rem',
                        '2xl': '1.5rem',
                    }
                }
            }
        }
    </script>

    <!-- FIX #7: Alpine.js versão fixada em release estável -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase SDK (Compat Version for Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script>
        // Use original Project ID as gathered
        const firebaseConfig = {
            projectId: "relatorio-edi-logs",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .animate-enter {
            animation: enter 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes enter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 3px;
        }
    </style>
</head>

<body class="bg-background text-gray-800 min-h-screen p-4 md:p-8" x-data="reportData()">

    <!-- Header -->
    <div class="max-w-7xl mx-auto mb-10 animate-enter" style="animation-delay: 0.1s">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900">Relatório de Análise EDI</h1><span
                    class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded ml-2">v3.0.1 - CLEAN</span>
                <p class="text-gray-600 mt-1">Período: <span class="font-medium text-gray-800"
                        x-text="dateRangeText"></span></p>
            </div>
            <div class="flex gap-3 flex-wrap">
                <div class="flex items-center gap-2">
                    <input type="date" x-model="startDate" @change="requestCustomSearch()" :disabled="isSearching"
                        class="px-3 py-2 bg-white border border-gray-200 rounded-xl text-sm text-gray-600 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary disabled:opacity-50 font-medium">
                    <span class="text-gray-500 text-sm font-medium">até</span>
                    <input type="date" x-model="endDate" @change="requestCustomSearch()" :disabled="isSearching"
                        class="px-3 py-2 bg-white border border-gray-200 rounded-xl text-sm text-gray-600 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary disabled:opacity-50 font-medium">
                    <div x-show="isSearching" class="ml-2 flex items-center">
                        <svg class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </div>
                </div>
                <button @click="expandAll = !expandAll"
                    class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-600 shadow-sm hover:shadow hover:bg-gray-50 transition">
                    <span x-text="expandAll ? 'Recolher Todos' : 'Expandir Todos'"></span>
                </button>
                <div class="relative">
                    <input type="text" x-model="search" placeholder="Filtrar clientes..."
                        class="pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary w-64 shadow-sm">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div x-show="isLoading" class="flex justify-center items-center py-20 animate-enter" style="animation-delay: 0.15s">
        <svg class="animate-spin h-10 w-10 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
        </svg>
    </div>

    <!-- Main Content -->
    <div x-show="!isLoading" class="transition-opacity duration-300">

        <!-- KPI Cards -->
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-5 gap-6 mb-10 animate-enter"
            style="animation-delay: 0.2s">
            <div
                class="bg-white/90 backdrop-blur-xl rounded-2xl p-6 shadow-soft border border-gray-100 flex flex-col items-center justify-center relative overflow-hidden group hover:shadow-float hover:-translate-y-1 transition-all duration-300">
                <div class="absolute inset-0 bg-gradient-to-br from-gray-50/50 to-transparent"></div>
                <div class="relative z-10 text-center">
                    <p class="text-sm font-medium text-gray-600 mb-1 transition-colors group-hover:text-gray-800">Total
                        de
                        Transações</p>
                    <h2 class="text-4xl font-bold text-gray-900" x-text="filteredStats.total"></h2>
                </div>
            </div>

            <div
                class="bg-white/90 backdrop-blur-xl rounded-2xl p-6 shadow-soft border border-gray-100 flex flex-col items-center justify-center relative overflow-hidden group hover:shadow-glow-success hover:-translate-y-1 transition-all duration-300">
                <div
                    class="absolute top-0 left-0 w-1 h-full bg-success opacity-80 group-hover:opacity-100 transition-opacity">
                </div>
                <div class="text-center relative z-10">
                    <p class="text-sm font-medium text-gray-600 mb-1 transition-colors group-hover:text-green-800">
                        Sucessos
                    </p>
                    <h2 class="text-4xl font-bold text-success group-hover:scale-105 transition-transform duration-300"
                        x-text="filteredStats.success"></h2>
                    <div
                        class="text-xs text-gray-500 mt-2 bg-green-50 px-2 py-1 rounded-full inline-block group-hover:bg-green-100 group-hover:text-green-700 transition-colors">
                        <span
                            x-text="((filteredStats.success / (filteredStats.total || 1)) * 100).toFixed(1) + '%'"></span>
                        Taxa
                    </div>
                </div>
            </div>

            <div
                class="bg-white/90 backdrop-blur-xl rounded-2xl p-6 shadow-soft border border-gray-100 flex flex-col items-center justify-center relative overflow-hidden group hover:shadow-glow-blue hover:-translate-y-1 transition-all duration-300">
                <div
                    class="absolute top-0 left-0 w-1 h-full bg-blue-500 opacity-80 group-hover:opacity-100 transition-opacity">
                </div>
                <div class="text-center relative z-10">
                    <p class="text-sm font-medium text-gray-600 mb-1 transition-colors group-hover:text-blue-800">
                        Pedidos
                        Recuperados</p>
                    <h2 class="text-4xl font-bold text-blue-500 group-hover:scale-105 transition-transform duration-300"
                        x-text="filteredStats.recovered"></h2>
                    <div
                        class="text-xs text-gray-500 mt-2 bg-blue-50 px-2 py-1 rounded-full inline-block group-hover:bg-blue-100 group-hover:text-blue-700 transition-colors">
                        <span
                            x-text="((filteredStats.recovered / (filteredStats.total || 1)) * 100).toFixed(1) + '%'"></span>
                        Taxa
                    </div>
                </div>
            </div>

            <div
                class="bg-white/90 backdrop-blur-xl rounded-2xl p-6 shadow-soft border border-gray-100 flex flex-col items-center justify-center relative overflow-hidden group hover:shadow-glow-error hover:-translate-y-1 transition-all duration-300">
                <div
                    class="absolute top-0 left-0 w-1 h-full bg-error opacity-80 group-hover:opacity-100 transition-opacity">
                </div>
                <div class="text-center relative z-10">
                    <p class="text-sm font-medium text-gray-600 mb-1 transition-colors group-hover:text-red-800">Erros
                        Únicos</p>
                    <h2 class="text-4xl font-bold text-error group-hover:scale-105 transition-transform duration-300"
                        x-text="filteredStats.error"></h2>
                    <div
                        class="text-xs text-gray-500 font-medium mt-2 bg-red-50 px-2 py-1 rounded-full inline-block group-hover:bg-red-100 group-hover:text-red-700 transition-colors">
                        <span
                            x-text="((filteredStats.error / (filteredStats.total || 1)) * 100).toFixed(1) + '%'"></span>
                        Taxa
                    </div>
                </div>
            </div>

            <div
                class="bg-white/90 backdrop-blur-xl rounded-2xl p-4 shadow-soft border border-gray-100 flex items-center justify-center overflow-hidden h-32 md:h-auto group-hover:shadow-float transition-all duration-300">
                <div style="width: 120px; height: 120px;" class="transition-transform duration-500 hover:scale-105">
                    <canvas id="kpiChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Group Lists -->
        <div class="max-w-7xl mx-auto space-y-6 animate-enter" style="animation-delay: 0.3s">
            <template x-for="(group, gIndex) in filteredGroups" :key="group.groupName">
                <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-soft border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-float hover:-translate-y-1"
                    :class="group.totalError > 0 ? 'border-l-4 border-l-error' : 'border-l-4 border-l-success'">

                    <!-- Group Header -->
                    <div class="p-5 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition-colors"
                        @click="toggleGroup(group.groupName)">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg font-bold shrink-0"
                                :class="group.totalError > 0 ? 'bg-red-50 text-error' : 'bg-green-50 text-success'">
                                <span x-text="group.groupName.charAt(0)"></span>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900" x-text="group.groupName"></h3>
                                <div class="flex gap-3 text-xs mt-1 items-center">
                                    <!-- Mini health bar -->
                                    <div class="w-20 h-1.5 bg-gray-100 rounded-full overflow-hidden"
                                        title="Proporção de erros não resolvidos">
                                        <div class="h-full rounded-full"
                                            :class="group.totalError > 0 ? 'bg-error' : 'bg-success'"
                                            :style="'width:' + ((group.totalError / Math.max(group.totalError + group.totalSuccess + (group.totalRecovered || 0), 1)) * 100).toFixed(1) + '%'">
                                        </div>
                                    </div>
                                    <span class="text-gray-400">|</span>
                                    <span
                                        class="bg-green-50 text-green-700 border border-green-100 px-2 py-0.5 rounded-md font-medium"
                                        title="Pedidos perfeitamente integrados (Flawless)">
                                        <span x-text="group.totalSuccess.toLocaleString('pt-BR')"></span>
                                        <span class="font-normal text-green-500"> trans. ✓</span>
                                    </span>
                                    <span x-show="(group.totalRecovered || 0) > 0"
                                        class="bg-blue-50 text-blue-700 border border-blue-100 px-2 py-0.5 rounded-md font-medium"
                                        title="Pedidos recuperados (corrigidos após erro)">
                                        <span x-text="group.totalRecovered.toLocaleString('pt-BR')"></span>
                                        <span class="font-normal text-blue-500"> recuperados</span>
                                    </span>
                                    <span class="px-2 py-0.5 rounded-md font-medium border transition-colors"
                                        :class="group.totalError > 0 ? 'bg-red-50 text-red-700 border-red-100' : 'bg-gray-50 text-gray-600 border-gray-200'"
                                        title="Pedidos únicos com algum erro no período">
                                        <span x-text="group.totalError"></span>
                                        <span class="font-normal"
                                            :class="group.totalError > 0 ? 'text-red-500' : 'text-gray-500'"> ped. c/
                                            erro</span>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="transform transition-transform duration-200"
                            :class="isExpanded(group.groupName) ? 'rotate-180' : ''">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7">
                                </path>
                            </svg>
                        </div>
                    </div>

                    <!-- Group Content (Collapsible) -->
                    <div x-show="isExpanded(group.groupName)" x-transition
                        class="border-t border-gray-100 bg-gray-50/50 p-4 md:p-6" style="display: none;">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <template x-for="client in group.clients" :key="client.label">
                                <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden transition-all duration-300 hover:-translate-y-0.5 relative group/card"
                                    :class="client.displayError > 0 ? 'border-l-4 border-l-red-400 hover:shadow-glow-error' : (client.recoveredCount > 0 && client.displaySuccess === 0 ? 'border-l-4 border-l-blue-400 hover:shadow-glow-blue' : 'border-l-4 border-l-green-400 hover:shadow-glow-success')">

                                    <!-- Card Header -->
                                    <div class="px-4 pt-4 pb-2">
                                        <div class="flex justify-between items-start gap-2">
                                            <h4 class="text-sm font-semibold text-gray-800 leading-tight"
                                                :title="client.label" x-text="client.label"></h4>
                                            <span x-show="client.last_transaction_date"
                                                class="text-[10px] text-gray-400 font-mono bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100 shrink-0 whitespace-nowrap"
                                                x-text="'último: ' + client.last_transaction_date"></span>
                                        </div>

                                        <!-- Stats Row -->
                                        <div class="flex gap-3 mt-2 items-center">
                                            <!-- Total transmissions -->
                                            <div class="flex items-center gap-1"
                                                title="Total de transmissões EDI bem-sucedidas">
                                                <svg class="w-3 h-3 text-green-400" fill="currentColor"
                                                    viewBox="0 0 20 20">
                                                    <path fill-rule="evenodd"
                                                        d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                                        clip-rule="evenodd" />
                                                </svg>
                                                <span class="text-sm font-bold text-green-600"
                                                    x-text="client.success.toLocaleString('pt-BR')"></span>
                                                <span class="text-[10px] text-green-400">transmissões</span>
                                            </div>

                                            <span x-show="client.error > 0" class="text-gray-200 text-xs">|</span>

                                            <!-- Unique error orders -->
                                            <div x-show="client.error > 0" class="flex items-center gap-1"
                                                title="Pedidos únicos com erro">
                                                <svg class="w-3 h-3 text-red-500" fill="currentColor"
                                                    viewBox="0 0 20 20">
                                                    <path fill-rule="evenodd"
                                                        d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                                                        clip-rule="evenodd" />
                                                </svg>
                                                <span class="text-sm font-bold text-red-600"
                                                    x-text="client.displayError"></span>
                                                <span class="text-[10px] text-red-500">ped. c/ erro</span>
                                            </div>
                                        </div>

                                        <!-- Health progress bar -->
                                        <div class="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden"
                                            title="Proporção de erros vs transmissões">
                                            <div class="h-full bg-red-400 rounded-full transition-all"
                                                :style="'width:' + Math.min(((client.error / Math.max(client.error + client.success, 1)) * 100), 100).toFixed(1) + '%'">
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Error Detail Section -->
                                    <template x-if="client.error > 0">
                                        <div class="mx-4 mb-4 mt-1 space-y-2">
                                            <div class="bg-red-50 border border-red-100 rounded-lg p-3 space-y-1.5">
                                                <p
                                                    class="text-[10px] font-bold text-red-400 uppercase tracking-widest mb-2">
                                                    ⚠ Motivo dos Erros</p>
                                                <template x-for="(count, msg) in client.error_types" :key="msg">
                                                    <div class="flex justify-between items-start gap-2 text-xs">
                                                        <span class="text-red-700 leading-snug" x-text="msg"
                                                            :title="msg"></span>
                                                        <span
                                                            class="font-bold text-red-600 bg-red-100 px-1.5 rounded shrink-0"
                                                            x-text="count + 'x'"></span>
                                                    </div>
                                                </template>
                                            </div>

                                            <!-- Error Orders -->
                                            <div x-show="exclusiveErrorOrders(client).length > 0">
                                                <div class="text-[10px] text-red-400 mb-1 flex justify-between items-center font-semibold uppercase tracking-wide cursor-help"
                                                    title="Pedidos que falharam e NÃO foram corrigidos. (Pedidos corrigidos são transpostos para as caixas verdes/amarelas)">
                                                    <span class="border-b border-dashed border-red-300">Pedidos
                                                        afetados</span>
                                                    <button @click="copyOrders(exclusiveErrorOrders(client))"
                                                        class="text-indigo-500 hover:text-indigo-700 font-medium normal-case text-[10px] tracking-normal">Copiar</button>
                                                </div>
                                                <div
                                                    class="flex flex-wrap gap-1 max-h-16 overflow-y-auto custom-scroll p-1.5 bg-red-50/50 border border-red-100 rounded-lg">
                                                    <template x-for="order in exclusiveErrorOrders(client)"
                                                        :key="order">
                                                        <span
                                                            class="text-[10px] font-mono bg-white text-red-700 border border-red-100 px-1.5 py-0.5 rounded cursor-pointer hover:bg-red-50"
                                                            title="Clique para copiar" @click="copyText(order)"
                                                            x-text="order"></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- Success Orders SPLIT -->
                                    <div class="mx-4 mb-4 mt-0 space-y-3">
                                        <!-- Rotas que falharam e depois deram certo -->
                                        <template x-if="recoveredOrders(client).length > 0">
                                            <div>
                                                <div class="text-[10px] text-blue-600 mb-1 flex justify-between items-center font-semibold uppercase tracking-wide cursor-help"
                                                    title="Pedidos que deram erro nesta janela e que agora já completaram a transmissão com sucesso.">
                                                    <span class="border-b border-dashed border-blue-300">✓ Pedidos
                                                        Recuperados</span>
                                                    <button @click="copyOrders(recoveredOrders(client))"
                                                        class="text-indigo-500 hover:text-indigo-700 font-medium normal-case text-[10px] tracking-normal">Copiar</button>
                                                </div>
                                                <div
                                                    class="flex flex-wrap gap-1 max-h-16 overflow-y-auto custom-scroll p-1.5 bg-blue-50/50 border border-blue-200 rounded-lg">
                                                    <template x-for="order in recoveredOrders(client)" :key="order">
                                                        <span
                                                            class="text-[10px] font-mono bg-white text-blue-700 border border-blue-200 px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-50"
                                                            title="Clique para copiar" @click="copyText(order)"
                                                            x-text="order"></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- Rotas 100% lisas que não têm erro -->
                                        <template x-if="flawlessOrders(client).length > 0">
                                            <div>
                                                <div class="text-[10px] text-green-600 mb-1 flex justify-between items-center font-semibold uppercase tracking-wide cursor-help"
                                                    title="Pedidos de primeira viagem que passaram liso, sem erros.">
                                                    <span class="border-b border-dashed border-green-300">✓ Pedidos de
                                                        Sucesso (Flawless)</span>
                                                    <button @click="copyOrders(flawlessOrders(client))"
                                                        class="text-indigo-500 hover:text-indigo-700 font-medium normal-case text-[10px] tracking-normal">Copiar</button>
                                                </div>
                                                <div
                                                    class="flex flex-wrap gap-1 max-h-16 overflow-y-auto custom-scroll p-1.5 bg-green-50/50 border border-green-100 rounded-lg">
                                                    <template x-for="order in flawlessOrders(client)" :key="order">
                                                        <span
                                                            class="text-[10px] font-mono bg-white text-green-700 border border-green-100 px-1.5 py-0.5 rounded cursor-pointer hover:bg-green-50"
                                                            title="Clique para copiar" @click="copyText(order)"
                                                            x-text="order"></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>

                                </div>
                            </template>
                        </div>
                    </div>

                </div>
            </template>
        </div>
    </div>

    <!-- Notification Toast -->
    <div x-show="toast.visible" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"

                isLoading: false,
                isSearching: false,
                search: '',
                startDate: '',
                endDate: '',
                expandAll: false,
                expandedGroups: {},
                toast: { visible: false, message: "" },
                _initialized: false,
                version: '3.0.1',

                async loadFromCache() {
                    if (this.rawGroupData && this.rawGroupData.length > 0) {
                        console.log("[Dashboard] Data available in rawGroupData, skipping cache/Firestore.");
                        this.isLoading = false;
                        return;
                    }
                    console.log("[Dashboard] loadFromCache: fetching from Firestore or empty.");
                    this.rawGroupData = [];
                    this.isLoading = false;
                },

                formatToBRDate(isoDate) {
                    if (!isoDate) return '';
                    const parts = isoDate.split('-');
                    if (parts.length !== 3) return isoDate;
                    return `${parts[2]}-${parts[1]}-${parts[0]}`;
                },

                formatDateToBR(isoDate) {
                    if (!isoDate) return '';
                    const parts = isoDate.split('-');
                    if (parts.length !== 3) return isoDate;
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                },

                formatAndSetData(groupsObj) {
                    let formattedGroups = [];

                    const sapMap = {
                        // === ENTRADAS LEGADAS (cache gerado ANTES da correção do backend) ===
                        // Formato antigo: 'C-XXXXX' onde XXXXX são os 5 primeiros dígitos do CNPJ
                        "C-09358": { "CardCode": "C016003", "CardName": "SHIBATA COMERCIAL ATACADISTA DE MERCADORIAS EM GERAL LTDA", "GroupName": "SHIBATA" },
                        "C-71038": { "CardCode": "C000051", "CardName": "COML E IMPORTADORA SAO SEBASTIAO LT", "GroupName": "SHIBATA" },
                        "C-06057": { "CardCode": "C005105", "CardName": "SENDAS DISTRIBUIDORA S/A", "GroupName": "ASSAI SP" },
                        "C-00185": { "CardCode": "C004431", "CardName": "COMERCIAL OSVALDO TARORA LTDA", "GroupName": "SHIBATA" },
                        "C-07424": { "CardCode": "C004997", "CardName": "SUPERMERCADO SHIBATA TAUBATE LTDA", "GroupName": "SHIBATA" },
                        "C-46079": { "CardCode": "C008964", "CardName": "SUPERMERCADOS SOLAR LTDA", "GroupName": "NAGUMO" },
                        "C-20276": { "CardCode": "C014191", "CardName": "SHIBATA COMERCIO E ATACADO DE PRODUTOS EM GERAL LTDA", "GroupName": "SHIBATA" },
                        "C-48093": { "CardCode": "C005904", "CardName": "SUPERMERCADO SHIBATA LTDA", "GroupName": "SHIBATA" },
                        "C-10432": { "CardCode": "C006726", "CardName": "SHIBATA EMPORIO LTDA", "GroupName": "SHIBATA" },
                        "C-50472": { "CardCode": "C014799", "CardName": "SUPERMERCADO SHIBATA JACAREI LTDA", "GroupName": "SHIBATA" },
                        "C-15061": { "CardCode": "C012194", "CardName": "SHIBATA CACAPAVA ATACADO E VAREJO DE MERCADORIAS EM GERAL LTDA", "GroupName": "SHIBATA" },
                        "C-17349": { "CardCode": "C014486", "CardName": "SK SUPERMERCADOS LTDA", "GroupName": "SHIBATA" },
                        "C-45543": { "CardCode": "C008631", "CardName": "CARREFOUR COMERCIO E INDUSTRIA LTDA", "GroupName": "CARREFOUR SP" },
                        "C-07705": { "CardCode": "C002254", "CardName": "MIXTER ATACADO E VAREJO DE GENEROS ALIMENTICIOS LTDA", "GroupName": "NAGUMO" },
                        "C-04744": { "CardCode": "C002548", "CardName": "MERCANTIL VISTA VERDE LTDA", "GroupName": "NAGUMO" },
                        "C-93209": { "CardCode": "C008465", "CardName": "WMS SUPERMERCADOS DO BRASIL LTDA", "GroupName": "ATACADAO SP" },
                        "C-05868": { "CardCode": "C007144", "CardName": "COMERCIAL ZARAGOZA IMPORTACAO E EXPORTACAO LIMITADA", "GroupName": "ZARAGOZA" },
                        "C-75315": { "CardCode": "C004300", "CardName": "ATACADAO S.A.", "GroupName": "ATACADAO SP" },
                        // FIX: TENDA legado C-01157 apontava para CardCode incorreto
                        "C-01157": { "CardCode": "C001340", "CardName": "TENDA ATACADO SA", "GroupName": "TENDA" },

                        // === ENTRADAS NOVO FORMATO (cache gerado APÓS correção do backend) ===
                        // Formato novo: 'CNPJ_XXXXXXXXXXXXXXXX' para clientes cujo CNPJ não existe no SAP.
                        // TENDA ATACADO: filial 0001-20 enviada pelo EDI não está no cadastro SAP.
                        // Diagnosticado: 47 filiais TENDA cadastradas, mas não esta específica.
                        // Resolução: agrupa na conta principal C001340.
                        "CNPJ_01157555000120": { "CardCode": "C001340", "CardName": "TENDA ATACADO SA", "GroupName": "TENDA" },

                        // ATACADÃO / WMS: CNPJ 93209170000108 é da bandeira WMS/Carrefour Atacadão.
                        // Não existe no cadastro SAP da Ruston como cliente.
                        // Resolução: agrupa no CardCode legado C008465 (WMS cadastrado).
                        "CNPJ_93209170000108": { "CardCode": "C008465", "CardName": "WMS SUPERMERCADOS DO BRASIL LTDA", "GroupName": "ATACADAO SP" }
                    };

                    // --- REAGRUPAMENTO FRONTEND COM sapMap ---
                    let regrouped = {};
                    if (groupsObj) {
                        for (const [oldGroupName, groupData] of Object.entries(groupsObj)) {
                            if (groupData.clients) {
                                for (const [cnpj, clientData] of Object.entries(groupData.clients)) {
                                    let sapInfo = sapMap[cnpj] || { CardCode: cnpj, CardName: clientData.name || cnpj, GroupName: oldGroupName };
                                    let newGroupName = sapInfo.GroupName;

                                    // FIX: clientes não resolvidos pelo SAP chegam com code='CNPJ_xxxxx'
                                    // Neste caso, usa o nome e CNPJ do backend sem expor o prefixo interno.
                                    let displayCode = sapInfo.CardCode;
                                    let displayName = sapInfo.CardName;
                                    if (typeof displayCode === 'string' && displayCode.startsWith('CNPJ_')) {
                                        const rawCnpj = displayCode.replace('CNPJ_', '');
                                        displayCode = `CNPJ: ${rawCnpj}`;
                                        displayName = clientData.name || rawCnpj;
                                    }
                                    let newLabel = `[${displayCode}] ${displayName}`;

                                    if (!regrouped[newGroupName]) {
                                        regrouped[newGroupName] = { clients: {}, total_success: 0, total_error: 0 };
                                    }

                                    regrouped[newGroupName].clients[cnpj] = {
                                        label: newLabel,
                                        ...clientData
                                    };
                                    regrouped[newGroupName].total_success += clientData.success || 0;
                                    regrouped[newGroupName].total_error += clientData.error || 0;
                                }
                            }
                        }
                    }
                    groupsObj = regrouped;
                    // --- FIM DO REAGRUPAMENTO ---

                    if (groupsObj) {
                        for (const [groupName, groupData] of Object.entries(groupsObj)) {
                            let clientsArray = [];
                            if (groupData.clients) {
                                for (const [clientCode, clientData] of Object.entries(groupData.clients)) {
                                    clientsArray.push({ ...clientData });
                                }
                            }
                            formattedGroups.push({
                                groupName: groupName,
                                totalSuccess: groupData.total_success || 0,
                                totalError: groupData.total_error || 0,
                                totalRecovered: groupData.total_recovered || 0,
                                clients: clientsArray
                            });
                        }
                    }
                    this.rawGroupData = formattedGroups;
                    this.expandedGroups = {};
                },

                async requestCustomSearch() {
                    if (!this._initialized) return;
                    if (!this.startDate || !this.endDate) return;

                    try {
                        this.isSearching = true;
                        const startStr = this.formatToBRDate(this.startDate);
                        const endStr = this.formatToBRDate(this.endDate);
                        const cacheId = `${startStr}_${endStr}`;

                        // Check cache
                        const cacheDoc = await db.collection('search_cache').doc(cacheId).get();
                        if (cacheDoc.exists) {
                            const data = cacheDoc.data();
                            this.formatAndSetData(data.result_data && data.result_data.groups ? data.result_data.groups : {});
                            this.isSearching = false;
                            this.showToast('Dados do cache carregados!');
                            return;
                        }

                        // Create Job
                        const jobRef = await db.collection('search_jobs').add({
                            status: 'pending',
                            created_at: Date.now(), // Fixed: using manual timestamp to avoid 400 on some clients
                            query_params: { start_date: startStr, end_date: endStr }
                        });
                        this.listenToJob(jobRef.id);
                        this.showToast('Solicitação enviada ao servidor...');
                    } catch (e) {
                        console.error("Search Error:", e);
                        this.isSearching = false;
                        this.showToast('Erro ao realizar busca Firestore.');
                    }
                },

                listenToJob(jobId) {
                    const unsubscribe = db.collection('search_jobs').doc(jobId).onSnapshot((doc) => {
                        if (!doc.exists) return;
                        const data = doc.data();
                        if (data.status === 'completed') {
                            this.formatAndSetData(data.result_data && data.result_data.groups ? data.result_data.groups : {});
                            this.isSearching = false;
                            this.showToast('Concluído!');
                            unsubscribe();
                        } else if (data.status === 'error') {
                            this.showToast('Erro: ' + data.error_message);
                            this.isSearching = false;
                            unsubscribe();
                        }
                    });
                },

                toggleGroup(name) { this.expandedGroups[name] = !this.expandedGroups[name]; },
                isExpanded(name) { return !!this.expandedGroups[name]; },
                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.visible = true;
                    setTimeout(() => { this.toast.visible = false; }, 3000);
                },
                copyText(text) { navigator.clipboard.writeText(text); this.showToast('Copiado!'); },
                copyOrders(orders) { if (orders) this.copyText(orders.join(', ')); },
                recoveredOrders(c) { return (c.success_orders || []).filter(id => (c.error_orders || []).includes(id)); },
                exclusiveErrorOrders(c) { return (c.error_orders || []).filter(id => !(c.success_orders || []).includes(id)); },
                flawlessOrders(c) { return (c.success_orders || []).filter(id => !(c.error_orders || []).includes(id)); },

                init() {
                    console.log("[Dashboard] Init Version:", this.version);
                    this.loadFromCache();
                    this.initChart();
                    this.$watch('expandAll', (val) => {
                        if (val) {
                            const exp = {};
                            this.rawGroupData.forEach(g => { exp[g.groupName] = true; });
                            this.expandedGroups = exp;
                        } else { this.expandedGroups = {}; }
                    });
                    this.$watch('filteredStats', (val) => this.updateChart(val));
                    this.$nextTick(() => { this._initialized = true; });
                },

                get dateRangeText() {
                    if (this.startDate && this.endDate) return `${this.formatDateToBR(this.startDate)} até ${this.formatDateToBR(this.endDate)}`;
                    return "Selecione um período";
                },

                get filteredStats() {
                    let s = 0, e = 0, r = 0;
                    this.filteredGroups.forEach(g => { s += g.totalSuccess; e += g.totalError; r += g.totalRecovered; });
                    return { total: s + e + r, success: s, error: e, recovered: r };
                },

                get filteredGroups() {
                    let q = this.search.toLowerCase();
                    return this.rawGroupData.map(g => {
                        const fc = g.clients.map(c => {
                            const recLen = this.recoveredOrders(c).length;
                            return { ...c, displaySuccess: Math.max(0, c.success - recLen), displayError: Math.max(0, c.error - recLen), recoveredCount: recLen };
                        });
                        return { ...g, clients: fc, totalSuccess: fc.reduce((a, b) => a + b.displaySuccess, 0), totalError: fc.reduce((a, b) => a + b.displayError, 0), totalRecovered: fc.reduce((a, b) => a + b.recoveredCount, 0) };
                    }).filter(g => !q || g.groupName.toLowerCase().includes(q) || g.clients.some(c => c.label.toLowerCase().includes(q)));
                },

                initChart() {
                    const ctx = document.getElementById('kpiChart').getContext('2d');
                    if (chartInstance) chartInstance.destroy(); // Fix potential reuse error
                    chartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: { labels: ['Sucesso', 'Recuperado', 'Erro'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#10B981', '#3b82f6', '#EF4444'], borderWidth: 0 }] },
                        options: { cutout: '75%', responsive: true, plugins: { legend: { display: false } } }
                    });
                },
                updateChart(stats) { if (chartInstance) { chartInstance.data.datasets[0].data = [stats.success, stats.recovered, stats.error]; chartInstance.update(); } }
            };
        }

    </script>
